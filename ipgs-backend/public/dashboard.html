<!doctype html>
<html>
  <head>
    <title>Admin Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: #f4f6f9;
        font-family: "Segoe UI";
      }

      .sidebar {
        width: 220px;
        height: 100vh;
        position: fixed;
        background: #111827;
        color: #fff;
        padding: 20px;
      }

      .sidebar a {
        display: block;
        color: #aaa;
        padding: 10px;
        border-radius: 6px;
        text-decoration: none;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background: #1f2937;
        color: #fff;
      }

      .main {
        margin-left: 220px;
        padding: 20px;
      }

      .topbar {
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .blog-card {
        background: #fff;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
      }

      .blog-card > div {
        padding: 5px;
      }

      .header-row {
        font-weight: bold;
        background: #e9ecef;
      }

      .drop-zone {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 10px;
      }

      .preview-img {
        width: 100%;
        max-height: 150px;
        object-fit: cover;
        margin-top: 10px;
      }

      img.img-dah {
        width: 70%;
        margin-bottom: 45px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <img src="http://localhost:5000/images/logo.png" class="img-dah" />
      <a href="#" onclick="loadBlogs()">Blogs</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main">
      <div class="topbar">
        <input
          type="text"
          id="search"
          placeholder="Search..."
          onkeyup="filterBlogs()"
          class="form-control w-25"
        />
        <button class="btn btn-primary" onclick="openModal()">
          + Add Blog
        </button>
      </div>

      <div class="blog-card header-row">
        <div style="width: 20%">Title</div>
        <div style="width: 15%">Date</div>
        <div style="width: 30%">Description</div>
        <div style="width: 15%">Image</div>
        <div style="width: 20%">Actions</div>
      </div>

      <div id="blogList"></div>
      <div id="pagination" class="text-center mt-3"></div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Add Blog</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <form id="blogForm">
              <input type="hidden" id="editId" />

              <input
                name="title"
                id="title"
                class="form-control mb-2"
                placeholder="Title"
              />
              <input
                type="date"
                name="date"
                id="date"
                class="form-control mb-2"
              />

              <div class="drop-zone" onclick="fileInput.click()">
                Drop image or click
                <input type="file" name="image" id="fileInput" hidden />
                <img id="preview" class="preview-img" />
              </div>

              <textarea id="content"></textarea>
            </form>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
            <button class="btn btn-success" onclick="saveBlog()">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ✅ CKEditor 5 -->
    <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      let blogs = [],
        filtered = [],
        page = 1;
      const BASE = "http://localhost:5000";
      let modal = new bootstrap.Modal(document.getElementById("modal"));

      let editor = null; // ✅ GLOBAL EDITOR

      init();
      async function init() {
        const r = await fetch(BASE + "/check-auth", { credentials: "include" });
        if (r.status !== 200) location.href = "login.html";
        loadBlogs();
      }

      async function loadBlogs() {
        const r = await fetch(BASE + "/blogs?page=1&limit=100", {
          credentials: "include",
        });
        const d = await r.json();
        blogs = d.blogs;
        filtered = [...blogs];
        render();
      }

      function render() {
        let start = (page - 1) * 5;
        let data = filtered.slice(start, start + 5);

        let html = "";
        data.forEach((b) => {
          html += `
    <div class="blog-card">
      <div style="width:20%"><b>${b.title}</b></div>
      <div style="width:15%">${b.date || ""}</div>
      <div style="width:30%">${short(b.content)}</div>
      <div style="width:15%">
        ${b.image ? `<img src="${BASE}/uploads/${b.image}" style="width:60px;height:40px;object-fit:cover;border-radius:6px;">` : ""}
      </div>
      <div style="width:20%">
        <button class="btn btn-sm btn-warning" onclick="edit('${b._id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="del('${b._id}')">Delete</button>
      </div>
    </div>`;
        });

        document.getElementById("blogList").innerHTML = html;

        let total = Math.ceil(filtered.length / 5);
        let pg = "";
        for (let i = 1; i <= total; i++) {
          pg += `<button onclick="go(${i})" class="btn btn-sm btn-outline-primary m-1">${i}</button>`;
        }
        document.getElementById("pagination").innerHTML = pg;
      }

      function go(p) {
        page = p;
        render();
      }

      function filterBlogs() {
        let q = document.getElementById("search").value.toLowerCase();
        filtered = blogs.filter((b) => b.title.toLowerCase().includes(q));
        page = 1;
        render();
      }

      /* ✅ MODAL FIXED */
      async function openModal() {
        document.getElementById("blogForm").reset();
        document.getElementById("editId").value = "";
        preview.src = "";

        if (editor) {
          await editor.destroy();
          editor = null;
        }

        editor = await ClassicEditor.create(
          document.querySelector("#content"),
          {
            toolbar: [
              "heading",
              "bold",
              "italic",
              "link",
              "bulletedList",
              "numberedList",
              "blockQuote",
              "codeBlock",
              "undo",
              "redo",
            ],
          },
        );

        modal.show();
      }

      /* ✅ EDIT FIXED */
      async function edit(id) {
        let b = blogs.find((x) => x._id === id);

        await openModal();

        document.getElementById("editId").value = id;
        document.getElementById("title").value = b.title;
        document.getElementById("date").value = b.date || "";

        editor.setData(b.content);
      }

      /* ✅ SAVE FIXED */
      async function saveBlog() {
        let id = document.getElementById("editId").value;
        let fd = new FormData(document.getElementById("blogForm"));
        fd.set("content", editor.getData());

        let url = id ? BASE + "/update-blog/" + id : BASE + "/add-blog";
        let method = id ? "PUT" : "POST";

        let r = await fetch(url, { method, body: fd, credentials: "include" });
        let d = await r.json();

        if (d.success) {
          toast("Saved ✅");
          modal.hide();
          loadBlogs();
        } else toast("Error ❌", "error");
      }

      /* DELETE */
      async function del(id) {
        if (!confirm("Delete?")) return;
        let r = await fetch(BASE + "/delete-blog/" + id, {
          method: "DELETE",
          credentials: "include",
        });
        let d = await r.json();
        if (d.success) {
          toast("Deleted");
          loadBlogs();
        }
      }

      /* IMAGE PREVIEW */
      let fileInput = document.getElementById("fileInput");
      let preview = document.getElementById("preview");

      fileInput.onchange = function () {
        let file = this.files[0];
        if (file) {
          preview.src = URL.createObjectURL(file);
        }
      };

      function short(html) {
        let t = html.replace(/<[^>]+>/g, "");
        return t.split(" ").slice(0, 15).join(" ") + "...";
      }

      function toast(msg, type = "success") {
        Toastify({
          text: msg,
          duration: 3000,
          backgroundColor: type === "success" ? "#28a745" : "#dc3545",
        }).showToast();
      }

      async function logout() {
        await fetch(BASE + "/logout", { credentials: "include" });
        location.href = "login.html";
      }
    </script>
  </body>
</html>
